<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐦</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlockWatch — Twitter Follower Analytics</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --bg-primary: #0a0e1a;
        --bg-secondary: #0f1629;
        --bg-card: #131929;
        --bg-hover: #1e2a4a;
        --accent-blue: #3b82f6;
        --accent-blue-light: #60a5fa;
        --accent-amber: #f59e0b;
        --accent-red: #ef4444;
        --accent-green: #22c55e;
        --text-primary: #f1f5f9;
        --text-secondary: #94a3b8;
        --text-muted: #475569;
        --border: #1e2a4a;
      }
      html, body, #root {
        height: 100%;
        background: var(--bg-primary);
        color: var(--text-primary);
        font-family: 'Syne', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: var(--bg-primary); }
      ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--accent-blue); }
      * { scrollbar-width: thin; scrollbar-color: var(--border) var(--bg-primary); }
      ::selection { background: rgba(59, 130, 246, 0.3); color: var(--text-primary); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
